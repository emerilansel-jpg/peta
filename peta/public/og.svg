<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="55%" stop-color="#FF8B6B"/>
      <stop offset="100%" stop-color="#4ECDC4"/>
    </linearGradient>
    <linearGradient id="yellow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD93D"/>
      <stop offset="100%" stop-color="#FFE066"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="22" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- decorative blobs -->
  <circle cx="1080" cy="120" r="180" fill="#ffffff" opacity="0.12"/>
  <circle cx="80"   cy="540" r="200" fill="#FFD93D" opacity="0.16"/>

  <!-- scarcity ribbon -->
  <g transform="translate(80, 90)">
    <rect width="430" height="56" rx="28" fill="#ffffff" opacity="0.25"/>
    <text x="32" y="36" font-family="Inter, system-ui, -apple-system, Helvetica, Arial, sans-serif" font-size="22" font-weight="800" fill="#ffffff" letter-spacing="1">
      🔒 FOUNDING 100 · SLOT TERBATAS
    </text>
  </g>

  <!-- main headline -->
  <g transform="translate(80, 200)">
    <text font-family="Inter, system-ui, -apple-system, Helvetica, Arial, sans-serif" font-size="92" font-weight="900" fill="#ffffff" letter-spacing="-2">
      <tspan x="0" dy="0">Cuma komen.</tspan>
      <tspan x="0" dy="105" fill="url(#yellow)" filter="url(#glow)">Dibayar tiap hari.</tspan>
    </text>
  </g>

  <!-- value bullets -->
  <g transform="translate(80, 460)" font-family="Inter, system-ui, -apple-system, Helvetica, Arial, sans-serif" fill="#ffffff">
    <text x="0" y="0" font-size="32" font-weight="700">
      💰 Rp5K–Rp20K per komen · Bonus Rp50K daftar · Cair 24 jam
    </text>
    <text x="0" y="56" font-size="26" font-weight="500" opacity="0.92">
      Sponsor founding 100 ekstra Rp25K. Sisa slot makin tipis tiap hari.
    </text>
  </g>

  <!-- brand mark bottom-right -->
  <g transform="translate(1010, 540)">
    <rect x="0" y="0" width="120" height="44" rx="12" fill="#ffffff"/>
    <text x="60" y="30" font-family="Inter, system-ui, -apple-system, Helvetica, Arial, sans-serif" font-size="22" font-weight="900" fill="#FF6B6B" text-anchor="middle">
      💰 PeTa
    </text>
  </g>
</svg>
